{% extends "base.html" %}
{% block title %}Register — MedBridge RCM{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 16px;">
  <div style="width:100%;max-width:480px;">
    <div style="text-align:center;margin-bottom:32px;">
      <div style="width:56px;height:56px;background:#0d9488;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
        <span style="color:white;font-size:24px;font-weight:700;">M</span>
      </div>
      <h1 style="font-size:24px;font-weight:600;color:#111827;">Start your free trial</h1>
      <p style="color:#6b7280;margin-top:4px;font-size:14px;">No credit card required · 60-day free trial</p>
    </div>
    <div style="background:white;border-radius:16px;border:1px solid #e5e7eb;padding:32px;">
      <form method="POST" action="{{ url_for('auth.register') }}">
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">Practice name</label>
          <input type="text" name="practice_name" required placeholder="Sunrise Family Medicine"
            style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
          <div>
            <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">First name</label>
            <input type="text" name="first_name" required placeholder="Jane"
              style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
          </div>
          <div>
            <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">Last name</label>
            <input type="text" name="last_name" required placeholder="Smith"
              style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
          </div>
        </div>
        <div style="margin-bottom:16px;">
          <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">Work email</label>
          <input type="email" name="email" required placeholder="jane@yourpractice.com"
            style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;">
          <div>
            <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">Password</label>
            <input type="password" name="password" required minlength="8" placeholder="Min 8 chars"
              style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
          </div>
          <div>
            <label style="display:block;font-size:14px;font-weight:500;color:#374151;margin-bottom:6px;">Confirm</label>
            <input type="password" name="confirm_password" required placeholder="Repeat"
              style="width:100%;padding:10px 16px;border-radius:8px;border:1px solid #d1d5db;font-size:14px;box-sizing:border-box;"/>
          </div>
        </div>
        <button type="submit"
          style="width:100%;background:#0d9488;color:white;font-weight:500;padding:10px 16px;border-radius:8px;border:none;font-size:14px;cursor:pointer;">
          Create free account
        </button>
      </form>
    </div>
    <p style="text-align:center;margin-top:24px;font-size:14px;color:#6b7280;">
      Already have an account? <a href="{{ url_for('auth.login') }}" style="color:#0d9488;font-weight:500;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
